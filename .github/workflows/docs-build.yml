name: Build Docs (MkDocs + PDF)

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'parts/**'
      - 'scripts/python/migrate_docs.py'
      - '.github/workflows/docs-build.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'parts/**'
      - 'scripts/python/migrate_docs.py'
      - '.github/workflows/docs-build.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------
      # 1. Check out the repository
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Install Pandoc (needed by the migration script)
      # ------------------------------------------------------------------
      - name: Install Pandoc
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pandoc

      # ------------------------------------------------------------------
      # 3. Set up Python
      # ------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ------------------------------------------------------------------
      # 4. Install MkDocs and plugins
      # ------------------------------------------------------------------
      - name: Install MkDocs and plugins
        run: |
          pip install --quiet \
            mkdocs \
            mkdocs-material \
            mkdocs-macros-plugin \
            mkdocs-with-pdf

      # ------------------------------------------------------------------
      # 5. Run the FODT → Markdown migration
      # ------------------------------------------------------------------
      - name: Migrate FODT to Markdown
        run: python scripts/python/migrate_docs.py --parts-dir parts --docs-dir docs

      # ------------------------------------------------------------------
      # 6. Build the MkDocs site (HTML)
      # ------------------------------------------------------------------
      - name: Build MkDocs site
        env:
          ENABLE_PDF_EXPORT: "1"
        run: mkdocs build --strict

      # ------------------------------------------------------------------
      # 7. Build the PDF (optional – only when the env-var is set)
      # ------------------------------------------------------------------
      - name: Build PDF
        env:
          ENABLE_PDF_EXPORT: "1"
        run: mkdocs build

      # ------------------------------------------------------------------
      # 8. Upload artifacts
      # ------------------------------------------------------------------
      - name: Upload HTML site
        uses: actions/upload-artifact@v4
        with:
          name: mkdocs-site
          path: site/

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: opm-reference-manual-pdf
          path: site/pdf/opm-reference-manual.pdf
          if-no-files-found: warn
